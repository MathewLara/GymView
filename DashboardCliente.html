<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Perfil | Iron Fitness</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    :root { --primary: #ffc107; --bg: #121212; --card: #1e1e1e; }
    body { background-color: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }

    /* SIDEBAR */
    .sidebar { width: 250px; position: fixed; height: 100vh; background: black; border-right: 1px solid #333; padding-top: 20px; z-index: 1000; }
    .main { margin-left: 250px; padding: 30px; }
    .card-panel { background: var(--card); padding: 25px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }

    /* NAV LINKS */
    .nav-link { color: #aaa; padding: 15px; cursor: pointer; display: flex; align-items: center; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { color: var(--primary); background: #222; border-left: 4px solid var(--primary); }
    .nav-link i { margin-right: 12px; font-size: 1.2rem; }

    /* VISTAS */
    .vista { display: none; animation: fadeIn 0.5s; }
    .vista.activa { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ESTILOS PARA EJERCICIOS COMPLETADOS */
    .ejercicio-completado {
      border-color: #198754 !important; /* Borde Verde */
      background-color: rgba(25, 135, 84, 0.1) !important; /* Fondo verdecito suave */
      opacity: 0.7;
      transition: all 0.3s ease;
    }

    .ejercicio-completado h5 {
      color: #198754 !important; /* Texto título verde */
      text-decoration: line-through;
    }

    .ejercicio-completado small {
      color: #aebfb5 !important;
    }
  </style>
</head>
<body>

<nav class="sidebar d-flex flex-column">
  <h3 class="text-center text-warning mb-4 fw-bold">IRON MEMBER</h3>
  <a class="nav-link active" onclick="ver('inicio', this)"><i class="bi bi-house-door"></i> Inicio</a>
  <a class="nav-link" onclick="ver('rutina', this)"><i class="bi bi-activity"></i> Mi Entrenamiento</a>
  <a class="nav-link" onclick="ver('membresia', this)"><i class="bi bi-credit-card-2-front"></i> Membresía</a>
  <a class="nav-link" href="catalogo.html"><i class="bi bi-bag-fill"></i> Tienda Online</a>
  <div class="mt-auto">
    <a class="nav-link text-danger border-top border-secondary" onclick="salir()"><i class="bi bi-box-arrow-left"></i> Salir</a>
  </div>
</nav>

<main class="main">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 id="titulo-pag">Bienvenido</h2>
    <div class="d-flex align-items-center">
      <div class="text-end me-3">
        <span class="d-block fw-bold text-warning" id="header-user">--</span>
        <small class="text-muted" id="header-plan">Cargando...</small>
      </div>
      <div class="bg-secondary rounded-circle d-flex justify-content-center align-items-center fw-bold text-white" style="width: 45px; height: 45px;">YO</div>
    </div>
  </div>

  <div id="vista-inicio" class="vista activa">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card-panel text-center border-top border-4 border-warning h-100">
          <h5 class="mb-3">Pase de Acceso</h5>
          <div class="bg-white p-2 d-inline-block rounded mb-3">
            <img id="img-qr" src="" width="160" alt="QR">
          </div>
          <p class="text-white-50 small mb-0">ID: <span id="lbl-id" class="text-white fw-bold">--</span></p>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card-panel h-100">
          <h5 class="text-warning mb-4">Mis Datos</h5>
          <p><strong>Nombre:</strong> <span id="p-nombre">--</span></p>
          <p><strong>Email:</strong> <span id="p-email">--</span></p>
          <p><strong>Teléfono:</strong> <span id="p-telefono">--</span></p>
          <hr class="border-secondary">
          <h5 class="text-warning mb-3">Últimos Ingresos</h5>
          <table class="table table-dark table-sm"><tbody id="tabla-asistencias"></tbody></table>
        </div>
      </div>
    </div>
  </div>

  <div id="vista-rutina" class="vista">
    <div id="rutina-container"></div>
  </div>

  <div id="vista-membresia" class="vista">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card-panel text-center">
          <h3 class="text-warning mb-4">Estado de tu Plan</h3>
          <div class="display-1 mb-3">
            <i class="bi bi-shield-check text-success" id="icono-estado"></i>
          </div>
          <h2 class="fw-bold mb-1" id="m-plan">--</h2>
          <span class="badge bg-success fs-6 mb-4" id="m-estado">--</span>

          <div class="row mt-4 text-start">
            <div class="col-md-6 mb-3">
              <div class="p-3 bg-black rounded border border-secondary">
                <small class="text-muted">Fecha de Vencimiento</small>
                <h5 class="text-white mb-0" id="m-fecha">--</h5>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <div class="p-3 bg-black rounded border border-secondary">
                <small class="text-muted">Costo Mensual</small>
                <h5 class="text-white mb-0" id="m-precio">--</h5>
              </div>
            </div>
          </div>
          <button class="btn btn-outline-warning w-100 mt-3" onclick="alert('Redirigiendo a pasarela de pagos...')">
            <i class="bi bi-credit-card"></i> Renovar Plan
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Validar Sesión
    const sesion = sessionStorage.getItem('usuarioLogueado');
    if(!sesion) { window.location.href = 'index.html'; return; }

    const usuario = JSON.parse(sesion);

    // Llenar datos básicos del header
    document.getElementById('header-user').textContent = usuario.usuario;
    document.getElementById('lbl-id').textContent = usuario.idUsuario;
    document.getElementById('img-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=IRON_${usuario.idUsuario}`;

    // 2. Cargar Datos del Servidor
    cargarDatos(usuario.idUsuario);
  });

  async function cargarDatos(id) {
    try {
      const res = await fetch(`http://localhost:8080/Gimnasio/api/clientes/${id}/dashboard`);

      if(res.ok) {
        const data = await res.json();

        // A. Perfil
        document.getElementById('p-nombre').textContent = data.nombreCompleto;
        document.getElementById('p-email').textContent = data.email;
        document.getElementById('p-telefono').textContent = data.telefono;

        // B. Membresía
        document.getElementById('header-plan').textContent = data.nombrePlan || "Sin Plan";
        document.getElementById('m-plan').textContent = data.nombrePlan || "Sin Plan";
        document.getElementById('m-precio').textContent = data.precioPlan ? "$" + data.precioPlan : "$0.00";
        document.getElementById('m-fecha').textContent = data.fechaVencimiento || "N/A";

        const badge = document.getElementById('m-estado');
        badge.textContent = data.estadoMembresia || "Inactivo";

        // Estilo del estado de membresía
        if(data.estadoMembresia === 'Vencido' || !data.estadoMembresia) {
          badge.className = 'badge bg-danger fs-6 mb-4';
          document.getElementById('icono-estado').className = 'bi bi-x-circle text-danger';
        } else {
          badge.className = 'badge bg-success fs-6 mb-4';
          document.getElementById('icono-estado').className = 'bi bi-shield-check text-success';
        }

        // C. Asistencias
        const tabla = document.getElementById('tabla-asistencias');
        tabla.innerHTML = data.historialAsistencias.length ?
          data.historialAsistencias.map(a => `<tr><td>${a.fecha}</td><td class="text-success">${a.hora}</td></tr>`).join('') :
          '<tr><td colspan="2" class="text-center text-muted">Sin registros</td></tr>';

        // D. RUTINA INTERACTIVA
        const divRutina = document.getElementById('rutina-container');
        if(data.nombreRutina) {
          // Recuperar checkboxes guardados hoy
          const hoy = new Date().toISOString().split('T')[0];
          const keyStorage = `rutina_${id}_${hoy}`;
          const completados = JSON.parse(localStorage.getItem(keyStorage)) || [];

          const lista = data.ejercicios.map((e, index) => {
            const estaHecho = completados.includes(index);

            return `
              <div id="card-ej-${index}" class="d-flex justify-content-between p-3 mb-2 bg-black border border-secondary rounded align-items-center ${estaHecho ? 'ejercicio-completado' : ''}">
                  <div>
                      <h5 class="text-warning mb-0">${e.nombre}</h5>
                      <small class="text-white-50">${e.seriesReps}</small>
                  </div>
                  <input type="checkbox"
                         class="form-check-input bg-dark border-secondary"
                         style="width:25px;height:25px;cursor:pointer;"
                         onclick="toggleEjercicio(${index}, ${id})"
                         ${estaHecho ? 'checked' : ''}>
              </div>`;
          }).join('');


          if(data.nombreRutina) {

            divRutina.innerHTML = `
            <div class="card-panel border-start border-4 border-warning mb-3">
              <h2>${data.nombreRutina}</h2>
              <p class="text-white-50">Coach: ${data.entrenador||'Staff'}</p>
            </div>
            ${lista}
            <button id="btnFinalizar" class="btn btn-success w-100 mt-4 py-3 rounded-pill fw-bold shadow" onclick="finalizarRutina()">
                <i class="bi bi-check-lg"></i> TERMINAR ENTRENAMIENTO
            </button>
          `;

            // NUEVO: Si el servidor dice que ya terminó, bloqueamos el botón de inmediato
            if (data.rutinaTerminadaHoy) {
              const btn = document.getElementById('btnFinalizar');
              btn.disabled = true;
              btn.textContent = "¡YA ENTRENASTE HOY!";
              btn.classList.replace('btn-success', 'btn-secondary');

              // Opcional: marcar los checks visualmente
              document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = true);

              // Opcional: Marcar todos los checkboxes visualmente
              document.querySelectorAll('input[type="checkbox"]').forEach(chk => {
                chk.checked = true;
                chk.parentElement.classList.add('ejercicio-completado');
              });
            }
          }

        } else {
          divRutina.innerHTML = `<div class="alert alert-dark text-center">No tienes rutina asignada.</div>`;
        }
      }
    } catch(e) { console.error(e); }
  }

  // --- LÓGICA DE CHECKBOXES (LocalStorage) ---
  function toggleEjercicio(index, userId) {
    // Si ya terminó hoy, no dejar desmarcar
    const btn = document.getElementById('btnTerminar');
    if (btn && btn.disabled) return;

    const hoy = new Date().toISOString().split('T')[0];
    const key = `rutina_${userId}_${hoy}`;
    const card = document.getElementById(`card-ej-${index}`);

    let guardados = JSON.parse(localStorage.getItem(key)) || [];

    if (guardados.includes(index)) {
      // Desmarcar
      guardados = guardados.filter(i => i !== index);
      card.classList.remove('ejercicio-completado');
    } else {
      // Marcar
      guardados.push(index);
      card.classList.add('ejercicio-completado');
    }

    localStorage.setItem(key, JSON.stringify(guardados));
  }

  // --- LÓGICA DE BOTÓN FINALIZAR (Backend) ---
  async function finalizarRutina() {
    const sesion = sessionStorage.getItem('usuarioLogueado');
    if (!sesion) return;
    const usuario = JSON.parse(sesion);

    if(confirm("¿Estás seguro de que terminaste tu rutina por hoy?")) {
      try {
        const url = `http://localhost:8080/Gimnasio/api/clientes/${usuario.idUsuario}/completar`;

        const res = await fetch(url, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'}
        });

        if(res.ok) {
          alert("✅ ¡Excelente! Tu entrenador ha sido notificado.");

          // Deshabilitar botón visualmente
          const btn = document.getElementById('btnTerminar');
          if(btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> ¡YA ENTRENASTE HOY!';
            btn.classList.remove('btn-success');
            btn.classList.add('btn-secondary');
          }
        } else {
          alert("Error al conectar con el servidor.");
        }
      } catch(e) {
        console.error(e);
        alert("❌ Error de conexión. Revisa que el servidor WildFly esté activo.");
      }
    }
  }

  // Navegación entre vistas
  function ver(v, link) {
    document.querySelectorAll('.vista').forEach(e => e.classList.remove('activa'));
    document.getElementById('vista-'+v).classList.add('activa');
    if(link) {
      document.querySelectorAll('.nav-link').forEach(e => e.classList.remove('active'));
      link.classList.add('active');
    }
  }

  // Cerrar sesión
  function salir() {
    if(confirm("¿Cerrar sesión?")) {
      sessionStorage.removeItem('usuarioLogueado');
      window.location.href = 'index.html';
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
