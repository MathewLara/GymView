<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Acceso | Iron Fitness</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/Kiosko.css">
</head>
<body>

<div class="text-center mb-4">
  <h1 class="fw-bold text-white display-4"><i class="bi bi-lightning-fill text-warning"></i> IRON ACCESS</h1>
  <p class="text-secondary fs-4">Acerca tu código QR al escáner</p>
</div>

<div class="scanner-container">
  <div class="scan-line"></div>
  <div class="camera-feed"></div>

  <div class="position-absolute bottom-0 w-100 p-3 bg-dark bg-opacity-75 text-center">
    <small class="text-muted d-block mb-2">[MODO SIMULACIÓN]</small>
    <button class="btn btn-sm btn-success me-2" onclick="simularAcceso(true)">Simular OK</button>
    <button class="btn btn-sm btn-danger" onclick="simularAcceso(false)">Simular Error</button>
  </div>
</div>

<input type="text" id="lector-input" style="opacity: 0; position: absolute;" autofocus>

<div id="overlay-success" class="status-overlay status-success">
  <img src="https://ui-avatars.com/api/?name=Juan+Perez&size=200" class="user-photo" alt="Usuario">
  <div class="status-icon"><i class="bi bi-check-circle-fill"></i></div>
  <h1 class="display-1 fw-bold">BIENVENIDO</h1>
  <h3 class="fw-light">Juan Pérez</h3>
  <p class="fs-4 mt-3">Membresía Activa • Plan Black</p>
  <div class="mt-4 badge bg-white text-success fs-5 px-4 py-2 rounded-pill">Disfruta tu entrenamiento</div>
</div>

<div id="overlay-error" class="status-overlay status-error">
  <div class="status-icon"><i class="bi bi-x-circle-fill"></i></div>
  <h1 class="display-1 fw-bold">ACCESO DENEGADO</h1>
  <h3 class="fw-light">Código Inválido o Vencido</h3>
  <p class="fs-4 mt-3">Por favor, dirígete a recepción</p>
  <button class="btn btn-outline-light btn-lg mt-4 rounded-pill" onclick="resetKiosk()">Intentar de nuevo</button>
</div>

<div class="kiosk-footer">
  <p class="m-0">Iron Fitness System v1.0 • Terminal ID: KIOSK-01</p>
  <p class="m-0 text-muted"> <i class="bi bi-wifi"></i> Conectado</p>
</div>

<a href="login.html" class="kiosk-mode-btn btn btn-outline-secondary btn-sm">
  <i class="bi bi-box-arrow-right"></i> Salir
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/Kiosko.js"></script>

</body>
</html>
