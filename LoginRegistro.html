<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta | Iron Fitness</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/LoginRegistro.css">
</head>
<body>

<div class="register-card">
  <div class="brand-logo">
    <i class="bi bi-lightning-fill"></i> Únete a Iron Fitness
  </div>

  <div id="statusMessage" class="alert alert-danger"></div>

  <div id="step1-datos" class="step-section">
    <p class="text-center text-white-50 mb-4">Empieza tu transformación hoy.</p>

    <form id="registerForm" novalidate>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nombre</label>
          <div class="input-group has-validation">
            <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="nombre">
            <div id="nombreError" class="invalid-feedback"></div>
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Apellido</label>
          <div class="input-group has-validation">
            <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person-vcard"></i></span>
            <input type="text" class="form-control" id="apellido">
            <div id="apellidoError" class="invalid-feedback"></div>
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Cédula de Identidad</label>
        <div class="input-group has-validation">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person-badge"></i></span>
          <input type="text" class="form-control" id="cedula" placeholder="10 dígitos">
          <div id="cedulaError" class="invalid-feedback"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <div class="input-group has-validation">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control" id="email">
          <div id="emailError" class="invalid-feedback"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Teléfono Móvil</label>
        <div class="input-group has-validation">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-telephone-fill"></i></span>
          <input type="tel" class="form-control" id="telefono" placeholder="Ej: 0991234567">
          <div id="telefonoError" class="invalid-feedback"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Fecha de Nacimiento</label>
        <div class="input-group has-validation">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-calendar-date"></i></span>
          <input type="date" class="form-control" id="fechaNacimiento">
          <div id="fechaError" class="invalid-feedback"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group has-validation">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person-fill"></i></span>
          <input type="text" class="form-control" id="username">
          <div id="usuarioError" class="invalid-feedback"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group has-validation">
          <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="password">
          <div id="passwordError" class="invalid-feedback"></div>
        </div>
      </div>

      <button type="submit" class="btn btn-brand" id="btn-submit-step1">
        REGISTRARME
      </button>
    </form>

    <div class="text-center mt-3">
      <small class="text-white-50">¿Ya tienes cuenta? <a href="login.html" class="text-warning text-decoration-none">Inicia sesión</a></small>
    </div>
  </div>

  <div id="step2-codigo" class="step-section hidden text-center">
    <div class="mb-4">
      <i class="bi bi-envelope-check text-warning" style="font-size: 3rem;"></i>
    </div>
    <h5 class="text-white mb-3">Verifica tu correo</h5>
    <p class="text-white-50">Hemos enviado un código a: <br><strong class="text-white" id="display-email"></strong></p>

    <form id="verifyForm" novalidate>
      <div class="mb-4 input-group has-validation justify-content-center">
        <input type="text" class="form-control code-input" id="verificationCode" placeholder="######" style="max-width: 200px;">
        <div id="codeError" class="invalid-feedback text-center"></div>
      </div>

      <button type="submit" class="btn btn-brand">
        VERIFICAR CUENTA
      </button>
    </form>

    <button onclick="regresarPaso1()" class="btn btn-link text-white-50 mt-3 text-decoration-none btn-sm">
      Corregir correo
    </button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/LoginRegistro.js"></script>

</body>
</html>
