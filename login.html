<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Iron Fitness</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    :root {
      --primary-color: #ffc107;
      --dark-bg: #121212;
      --card-bg: #1e1e1e;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--dark-bg);
      background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
      url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background-color: var(--card-bg);
      border: 1px solid #333;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      color: white;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .brand-logo {
      color: var(--primary-color);
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .form-control {
      background-color: #2c2c2c;
      border: 1px solid #444;
      color: white;
      padding: 0.75rem;
    }

    .form-control:focus {
      background-color: #2c2c2c;
      color: white;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25);
    }

    /* Estilo para cuando hay error (borde rojo) */
    .form-control.is-invalid {
      border-color: #dc3545;
      background-image: none; /* Quitamos icono por defecto de bootstrap para mantener limpieza */
    }

    /* Estilo del texto de error debajo del input */
    .invalid-feedback {
      font-size: 0.85rem;
      color: #ff6b6b; /* Rojo claro para que se vea en fondo oscuro */
    }

    .btn-login {
      background-color: var(--primary-color);
      color: black;
      font-weight: bold;
      padding: 0.75rem;
      width: 100%;
      border: none;
      margin-top: 1rem;
      transition: all 0.3s;
    }

    .btn-login:hover {
      background-color: #e0a800;
      transform: translateY(-2px);
    }

    .register-section {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #ccc;
    }

    .register-section a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
      margin-left: 5px;
      transition: color 0.3s;
    }

    .register-section a:hover {
      color: #fff;
      text-decoration: underline;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: #6c757d;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--primary-color);
    }

    .form-label {
      font-weight: 500;
      font-size: 0.9rem;
      color: #ccc;
    }

    /* El mensaje superior solo para errores de red/conexión */
    #statusMessage {
      margin-top: 1rem;
      text-align: center;
      padding: 0.5rem;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="brand-logo">
    <i class="bi bi-lightning-fill"></i> Iron Fitness
  </div>

  <h5 class="text-center mb-4 text-white-50">Acceso al Sistema</h5>

  <div id="statusMessage" class="text-white"></div>

  <form id="loginForm">
    <div class="mb-3">
      <label for="username" class="form-label">Usuario</label>
      <div class="input-group has-validation"> <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person-fill"></i></span>
        <input type="text" class="form-control" id="username" placeholder="Ingresa tu usuario">
        <div id="usernameError" class="invalid-feedback"></div>
      </div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <div class="input-group has-validation">
        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña">
        <div id="passwordError" class="invalid-feedback"></div>
      </div>
    </div>

    <button type="submit" class="btn btn-login">INGRESAR</button>
  </form>

  <div class="register-section">
    ¿No tienes una cuenta?
    <a href="loginregistro.html">Crea una</a>
  </div>

  <a href="index.html" class="back-link">
    <i class="bi bi-arrow-left"></i> Volver al Inicio
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // --- CONFIGURACIÓN ---
  const BASE_URL = "http://localhost:8080";
  const API_URL = `${BASE_URL}/Gimnasio/api/auth/login`;

  const loginForm = document.getElementById('loginForm');
  const statusMessage = document.getElementById('statusMessage');
  const btnSubmit = loginForm.querySelector('button');

  // Función para mensajes visuales
  function showGlobalStatus(message, type = 'danger') {
    statusMessage.textContent = message;
    statusMessage.style.display = 'block';
    statusMessage.className = `alert alert-${type}`;
  }

  // Limpiar errores previos
  function clearErrors() {
    statusMessage.style.display = 'none';
    document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
    document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
  }

  loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearErrors();

    // UI: Botón cargando
    const textoOriginal = btnSubmit.innerText;
    btnSubmit.disabled = true;
    btnSubmit.innerText = "Ingresando...";

    const payload = {
      usuario: document.getElementById('username').value,
      contrasena: document.getElementById('password').value
    };

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await response.json();

      if (response.ok) {
        // === ¡AQUÍ ESTABA EL ERROR! ===
        // Antes decía 'authToken', ahora usamos el nombre correcto:
        if (data.token) {
          localStorage.setItem('tokenGimnasio', data.token);
        }

        // También guardamos los datos del usuario para poner "Hola Mathew"
        sessionStorage.setItem('usuarioLogueado', JSON.stringify(data));

        showGlobalStatus('¡Login Correcto! Entrando...', 'success');

        // Redirección con pequeño retraso para que veas el mensaje verde
        setTimeout(() => {
          // Detectamos el rol (puede venir como 'idRol' o 'id_rol')
          const rol = data.idRol || data.id_rol;

          console.log("Rol detectado:", rol); // Mira la consola si falla

          switch (rol) {
            case 1: window.location.href = 'DashboardAdmin.html'; break;
            case 2: window.location.href = 'DashboardRecep.html'; break;
            case 3: window.location.href = 'DashboardEntrenador.html'; break;
            case 4: window.location.href = 'DashboardCliente.html'; break;
            default:
              showGlobalStatus('Error: Rol de usuario desconocido (' + rol + ')', 'warning');
              btnSubmit.disabled = false;
              btnSubmit.innerText = textoOriginal;
          }
        }, 1000);

      } else {
        // Error de credenciales
        btnSubmit.disabled = false;
        btnSubmit.innerText = textoOriginal;
        showGlobalStatus(data.mensaje || 'Credenciales incorrectas');
      }

    } catch (error) {
      console.error(error);
      btnSubmit.disabled = false;
      btnSubmit.innerText = textoOriginal;
      showGlobalStatus('No se pudo conectar al servidor BackEnd.');
    }
  });
</script>
</body>
</html>
