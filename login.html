<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Iron Fitness</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-card">
  <div class="brand-logo">
    <i class="bi bi-lightning-fill"></i> Iron Fitness
  </div>

  <h5 class="text-center mb-4 text-white-50">Acceso al Sistema</h5>

  <div id="statusMessage" class="text-white"></div>

  <form id="loginForm" novalidate>
    <div class="mb-3">
      <label for="username" class="form-label">Usuario</label>
      <div class="input-group has-validation">
        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person-fill"></i></span>
        <input type="text" class="form-control" id="username" placeholder="Ingresa tu usuario">
        <div id="usernameError" class="invalid-feedback"></div>
      </div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <div class="input-group has-validation">
        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña">
        <div id="passwordError" class="invalid-feedback"></div>
      </div>
    </div>

    <button type="submit" class="btn btn-login">INGRESAR</button>
  </form>

  <div class="register-section">
    ¿No tienes una cuenta?
    <a href="loginregistro.html">Crea una</a>
  </div>

  <a href="index.html" class="back-link">
    <i class="bi bi-arrow-left"></i> Volver al Inicio
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>

</body>
</html>
