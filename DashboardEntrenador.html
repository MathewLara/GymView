<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Entrenador | Iron Fitness</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    :root { --primary: #ffc107; --bg: #121212; --card: #1e1e1e; }
    body { background-color: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }

    .sidebar { width: 260px; position: fixed; height: 100vh; background: black; border-right: 1px solid #333; padding-top: 20px; z-index: 1000; }
    .sidebar-brand { color: var(--primary); font-weight: bold; font-size: 1.5rem; text-align: center; margin-bottom: 2rem; }

    .main { margin-left: 260px; padding: 30px; }
    .card-panel { background: var(--card); padding: 25px; border-radius: 10px; border: 1px solid #333; height: 100%; margin-bottom: 20px; }

    .nav-link { color: #aaa; padding: 15px 20px; cursor: pointer; display: flex; align-items: center; transition: 0.3s;}
    .nav-link i { margin-right: 12px; font-size: 1.2rem; }
    .nav-link.active, .nav-link:hover { color: var(--primary); background: #222; border-left: 4px solid var(--primary); }

    .vista { display: none; animation: fadeIn 0.4s; }
    .vista.activa { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav class="sidebar d-flex flex-column">
  <div class="sidebar-brand"><i class="bi bi-lightning-fill"></i> IRON COACH</div>
  <div class="px-3 mb-4">
    <button class="btn btn-warning w-100 fw-bold" onclick="abrirModal()">
      <i class="bi bi-plus-circle"></i> Nueva Rutina
    </button>
  </div>

  <a class="nav-link active" onclick="ver('tablero', this)"><i class="bi bi-speedometer2"></i> Mi Tablero</a>
  <a class="nav-link" onclick="ver('clientes', this)"><i class="bi bi-people-fill"></i> Mis Alumnos</a>
  <a class="nav-link" onclick="ver('rutinas', this)"><i class="bi bi-collection-play-fill"></i> Biblioteca</a>

  <div class="mt-auto">
    <a class="nav-link text-danger border-top border-secondary" onclick="salir()"><i class="bi bi-box-arrow-left"></i> Salir</a>
  </div>
</nav>

<main class="main">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 id="titulo-seccion">Mi Tablero</h2>
    <div class="d-flex align-items-center">
      <div class="text-end me-3">
        <p class="mb-0 fw-bold text-warning" id="lbl-nombre">Cargando...</p>
        <small class="text-muted" id="lbl-especialidad">--</small>
      </div>
      <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center fw-bold" style="width: 45px; height: 45px;">CO</div>
    </div>
  </div>

  <div id="vista-tablero" class="vista activa">
    <div class="row g-4 mb-4">
      <div class="col-md-6">
        <div class="card-panel d-flex justify-content-between align-items-center border-start border-4 border-primary">
          <div><h6 class="text-secondary">ALUMNOS ACTIVOS</h6><h1 class="fw-bold mb-0" id="num-alumnos">0</h1></div>
          <i class="bi bi-people fs-1 text-primary"></i>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card-panel d-flex justify-content-between align-items-center border-start border-4 border-warning">
          <div><h6 class="text-secondary">RUTINAS CREADAS</h6><h1 class="fw-bold mb-0" id="num-rutinas">0</h1></div>
          <i class="bi bi-journal-text fs-1 text-warning"></i>
        </div>
      </div>
    </div>

    <div class="card-panel">
      <h5 class="mb-3">🔥 Últimas Rutinas Creadas</h5>
      <ul class="list-group list-group-flush" id="lista-rutinas-dash"></ul>
    </div>
  </div>

  <div id="vista-clientes" class="vista">
    <div class="card-panel">
      <h5 class="mb-4">Gestión de Alumnos</h5>
      <div class="table-responsive">
        <table class="table table-dark table-hover align-middle">
          <thead><tr><th>Alumno</th><th>Membresía</th><th>Rutina Actual</th><th>Acción</th></tr></thead>
          <tbody id="tabla-clientes"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="vista-rutinas" class="vista">
    <div class="card-panel">
      <h5 class="mb-4">Biblioteca Completa</h5>
      <div class="list-group" id="lista-rutinas-full"></div>
    </div>
  </div>
</main>

<div class="modal fade" id="modalRutina" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content bg-dark border border-secondary text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-warning">Diseñar Nueva Rutina</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formRutina">
          <div class="mb-3">
            <label class="form-label">Nombre de la Rutina</label>
            <input type="text" class="form-control bg-black text-white border-secondary" id="txtNombreRutina" placeholder="Ej: Hipertrofia Pecho" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Asignar al Alumno:</label>
            <select class="form-select bg-black text-white border-secondary" id="selAlumno">
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label text-warning">Seleccionar Ejercicios:</label>
            <div class="border border-secondary rounded p-2" style="max-height: 150px; overflow-y: auto;">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="1" id="ej1">
                <label class="form-check-label" for="ej1">Press de Banca Plano</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="2" id="ej2">
                <label class="form-check-label" for="ej2">Sentadilla con Barra</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="3" id="ej3">
                <label class="form-check-label" for="ej3">Jalón al Pecho</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="4" id="ej4">
                <label class="form-check-label" for="ej4">Curl con Mancuernas</label>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-warning fw-bold" onclick="guardarRutina()">Guardar y Asignar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Variable global para guardar la lista de alumnos y poder usarla en el Modal
  let listaAlumnosCache = [];

  document.addEventListener('DOMContentLoaded', () => {
    const sesion = sessionStorage.getItem('usuarioLogueado');
    if(!sesion) { window.location.href = 'index.html'; return; }
    const usuario = JSON.parse(sesion);
    cargarDashboard(usuario.idUsuario);
  });

  async function cargarDashboard(idUsuario) {
    try {
      const API_URL = `http://localhost:8080/Gimnasio/api/entrenadores/${idUsuario}/dashboard`;
      const res = await fetch(API_URL);

      if(res.ok) {
        const data = await res.json();

        // Guardamos los alumnos en la variable global para usarla luego en el Modal
        listaAlumnosCache = data.listaAlumnos;

        // A. Cabecera
        document.getElementById('lbl-nombre').textContent = data.nombre;
        document.getElementById('lbl-especialidad').textContent = data.especialidad;
        document.getElementById('num-alumnos').textContent = data.totalAlumnos;
        document.getElementById('num-rutinas').textContent = data.rutinasCreadas;

        // B. Tabla Clientes (CON EL CHECK VERDE QUE YA TENÍAS)
        const tablaC = document.getElementById('tabla-clientes');
        if (data.listaAlumnos && data.listaAlumnos.length > 0) {
          tablaC.innerHTML = data.listaAlumnos.map(al => `
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="rounded-circle me-2 d-flex justify-content-center align-items-center text-white fw-bold"
                                         style="width:35px;height:35px; background-color: ${al.terminoHoy ? '#198754' : '#6c757d'};">
                                         ${al.terminoHoy ? '<i class="bi bi-check-lg"></i>' : al.nombre.charAt(0)}
                                    </div>
                                    <div>
                                        ${al.nombre}
                                        ${al.terminoHoy ? '<span class="badge bg-success ms-2" style="font-size:0.7em">¡TERMINÓ HOY!</span>' : ''}
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge ${al.plan?.includes('Black') ? 'bg-warning text-dark' : 'bg-info'}">${al.plan}</span></td>
                            <td><small class="text-white-50">${al.rutina}</small></td>
                            <td><button class="btn btn-sm btn-outline-light"><i class="bi bi-eye"></i></button></td>
                        </tr>
                    `).join('');
        } else {
          tablaC.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No tienes alumnos asignados.</td></tr>';
        }

        // C. Listas de Rutinas
        const htmlRutinas = data.listaRutinas.map(r =>
          `<li class="list-group-item bg-transparent text-white border-secondary d-flex justify-content-between">
                        <span>${r}</span> <i class="bi bi-chevron-right text-muted"></i>
                    </li>`
        ).join('');
        document.getElementById('lista-rutinas-dash').innerHTML = htmlRutinas;

        document.getElementById('lista-rutinas-full').innerHTML = data.listaRutinas.map(r =>
          `<a href="#" class="list-group-item list-group-item-action bg-black text-white border-secondary mb-2 rounded">
                        <h6 class="mb-1 text-warning">${r}</h6>
                        <small class="text-muted">Rutina personalizada</small>
                    </a>`
        ).join('');

      }
    } catch(e) { console.error(e); }
  }

  // ==========================================
  // NUEVAS FUNCIONES PARA EL MODAL DE RUTINA
  // ==========================================

  // REEMPLAZAR TU FUNCIÓN abrirModal POR ESTA:
  function abrirModal() {
    const select = document.getElementById('selAlumno');
    select.innerHTML = ''; // Limpiar opciones viejas

    // USAMOS LA LISTA REAL QUE VINO DE JAVA (Ya no inventamos IDs)
    if(listaAlumnosCache.length > 0) {
      listaAlumnosCache.forEach(alumno => {
        // Creamos una opción con el ID y Nombre REALES
        const opcion = document.createElement('option');
        opcion.value = alumno.idCliente; // Aquí usa el ID correcto (sea 5, 6 o 100)
        opcion.text = alumno.nombre;
        select.appendChild(opcion);
      });
    } else {
      select.innerHTML = '<option disabled>No tienes alumnos asignados</option>';
    }

    const modal = new bootstrap.Modal(document.getElementById('modalRutina'));
    modal.show();
  }

  async function guardarRutina() {
    const sesion = JSON.parse(sessionStorage.getItem('usuarioLogueado'));

    const nombreRutina = document.getElementById('txtNombreRutina').value;
    const idCliente = document.getElementById('selAlumno').value;

    // Recopilar IDs de ejercicios marcados
    let idsEjercicios = [];
    if(document.getElementById('ej1').checked) idsEjercicios.push(1);
    if(document.getElementById('ej2').checked) idsEjercicios.push(2);
    if(document.getElementById('ej3').checked) idsEjercicios.push(3);
    if(document.getElementById('ej4').checked) idsEjercicios.push(4);

    if(nombreRutina === "") { alert("Por favor escribe un nombre para la rutina."); return; }
    if(idsEjercicios.length === 0) { alert("Selecciona al menos un ejercicio."); return; }

    const datos = {
      idCliente: parseInt(idCliente),
      nombreRutina: nombreRutina,
      idsEjercicios: idsEjercicios
    };

    try {
      const res = await fetch(`http://localhost:8080/Gimnasio/api/entrenadores/${sesion.idUsuario}/crearRutina`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(datos)
      });

      if(res.ok) {
        alert("✅ ¡Rutina creada y asignada exitosamente!");
        location.reload(); // Recargar página para ver cambios
      } else {
        alert("Hubo un error al guardar la rutina.");
      }
    } catch(e) { console.error(e); }
  }

  // Navegación
  function ver(vista, link) {
    document.getElementById('titulo-seccion').textContent = link ? link.innerText : 'Panel';
    document.querySelectorAll('.vista').forEach(e => e.classList.remove('activa'));
    document.getElementById('vista-'+vista).classList.add('activa');
    if(link) {
      document.querySelectorAll('.nav-link').forEach(e => e.classList.remove('active'));
      link.classList.add('active');
    }
  }

  function salir() {
    if(confirm("¿Cerrar sesión?")) {
      sessionStorage.removeItem('usuarioLogueado');
      window.location.href = 'index.html';
    }
  }
</script>
</body>
</html>
