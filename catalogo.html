<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo | Iron Fitness</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    :root {
      --primary-color: #ffc107;
      --dark-bg: #121212;
      --card-bg: #1e1e1e;
      --text-gray: #b0b3b8;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--dark-bg);
      color: white;
      min-height: 100vh;
      padding-bottom: 80px; /* Espacio para el botón flotante */
    }

    /* Navbar Personalizado */
    .navbar {
      background-color: rgba(18, 18, 18, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #333;
    }

    .brand-logo {
      color: var(--primary-color);
      font-weight: bold;
      text-transform: uppercase;
      font-size: 1.5rem;
      text-decoration: none;
      margin-right: 2rem;
    }

    .nav-link {
      color: #fff !important;
      font-weight: 500;
      margin-left: 1rem;
      transition: color 0.3s;
    }

    .nav-link:hover {
      color: var(--primary-color) !important;
    }

    .btn-socios {
      border: 2px solid var(--primary-color);
      color: var(--primary-color);
      font-weight: bold;
      border-radius: 30px;
      padding: 0.4rem 1.5rem;
      transition: all 0.3s;
      text-decoration: none;
    }

    .btn-socios:hover {
      background-color: var(--primary-color);
      color: black;
    }

    /* Filtros / Tabs */
    .nav-pills .nav-link {
      color: var(--text-gray);
      background-color: #2c2c2c;
      margin-right: 10px;
      border: 1px solid #444;
      transition: all 0.3s;
    }

    .nav-pills .nav-link.active {
      background-color: var(--primary-color);
      color: black !important;
      font-weight: bold;
      border-color: var(--primary-color);
    }

    /* Tarjetas de Producto */
    .product-card {
      background-color: var(--card-bg);
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(255, 193, 7, 0.15);
      border-color: var(--primary-color);
    }

    .card-img-top {
      height: 200px;
      object-fit: cover;
      border-bottom: 1px solid #333;
    }

    .card-body {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .price-tag {
      font-size: 1.5rem;
      color: var(--primary-color);
      font-weight: bold;
      margin-top: 1rem;
    }

    /* Animación de entrada */
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="brand-logo" href="index.html">
      <i class="bi bi-lightning-fill"></i> Iron Fitness
    </a>
    <button class="navbar-toggler bg-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#instalaciones">Instalaciones</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#planes">Planes</a></li>
      </ul>
      <div class="d-flex gap-2">
        <a href="login.html" class="btn-socios">Zona Socios</a>
      </div>
    </div>
  </div>
</nav>

<div class="container" style="margin-top: 100px; margin-bottom: 50px;">

  <div class="row mb-4 align-items-center">
    <div class="col-md-6">
      <h2 class="text-white">Nuestro Catálogo</h2>
      <p class="text-white-50">Explora nuestros productos y equipamiento.</p>
    </div>
    <div class="col-md-6 d-flex justify-content-md-end">
      <ul class="nav nav-pills" id="pills-tab">
        <li class="nav-item"><button class="nav-link active" id="pills-todos-tab" onclick="filtrarProductos('todos')">Todos</button></li>
        <li class="nav-item"><button class="nav-link" id="pills-venta-tab" onclick="filtrarProductos('venta')">Tienda</button></li>
        <li class="nav-item"><button class="nav-link" id="pills-uso-tab" onclick="filtrarProductos('uso')">Equipamiento</button></li>
      </ul>
    </div>
  </div>

  <div class="row g-4" id="catalogo-container">
  </div>

  <div class="text-center mt-5">
    <a href="index.html" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> Volver al Inicio</a>
  </div>
</div>

<button class="btn btn-warning rounded-circle shadow-lg position-fixed bottom-0 end-0 m-4 p-0 d-flex align-items-center justify-content-center"
        style="z-index: 1050; width: 65px; height: 65px; border: 2px solid white;"
        data-bs-toggle="modal" data-bs-target="#modalCarrito" onclick="carritoController.renderizarModal()">
  <i class="bi bi-cart-fill fs-3 text-dark"></i>
  <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light d-none">0</span>
</button>

<div class="modal fade" id="modalCarrito" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark text-white border-secondary shadow-lg">
      <div class="modal-header border-secondary bg-black">
        <h5 class="modal-title fw-bold text-warning"><i class="bi bi-bag-check-fill me-2"></i> Tu Pedido</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-0">
        <div id="carrito-items-container" class="p-3" style="max-height: 400px; overflow-y: auto;"></div>
        <div id="carrito-vacio-msg" class="text-center py-5 d-none">
          <i class="bi bi-cart-x fs-1 text-secondary"></i>
          <p class="text-white-50 mt-3">Tu carrito está vacío.</p>
          <button class="btn btn-outline-warning btn-sm mt-2" data-bs-dismiss="modal">Ir a comprar</button>
        </div>
      </div>

      <div class="modal-footer border-secondary bg-black d-flex justify-content-between">
        <div class="text-start">
          <small class="text-white-50 d-block">Total Estimado</small>
          <h3 class="fw-bold text-white mb-0">$<span id="carrito-total-label">0.00</span></h3>
        </div>
        <div>
          <button type="button" class="btn btn-outline-light me-2" onclick="carritoController.vaciar()">Vaciar</button>
          <button type="button" class="btn btn-warning fw-bold px-4" onclick="carritoController.procesarPago()">
            CONFIRMAR PEDIDO <i class="bi bi-arrow-right-circle-fill ms-2"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // --- CONSTANTES ---
  const CONFIG = {
    BASE_URL: "http://localhost:8080",
    API_PRODUCTOS: "http://localhost:8080/Gimnasio/api/productos",
    API_VENTAS: "http://localhost:8080/Gimnasio/api/ventas",
    STORAGE_KEY: "IronFitness_Cart_V1"
  };

  let inventarioGlobal = [];

  // --- CONTROLADOR DEL CARRITO (Estado y Acciones) ---
  const carritoController = {
    state: {
      items: JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY)) || []
    },

    agregar: function(idProducto) {
      // Validar que el producto exista en memoria
      const productoRef = inventarioGlobal.find(p => (p.idProducto || p.id) === idProducto);
      if (!productoRef) return;

      const index = this.state.items.findIndex(item => item.id === idProducto);

      if (index >= 0) {
        this.state.items[index].cantidad++;
      } else {
        this.state.items.push({
          id: idProducto,
          nombre: productoRef.nombre,
          precio: productoRef.precio,
          cantidad: 1,
          imagen: `${CONFIG.API_PRODUCTOS}/${idProducto}/imagen`
        });
      }

      this.guardar();
      this.actualizarUI();
      // Pequeña notificación visual (Toast simulado)
      alert(`✅ ${productoRef.nombre} agregado al carrito.`);
    },

    eliminar: function(idProducto) {
      this.state.items = this.state.items.filter(item => item.id !== idProducto);
      this.guardar();
      this.renderizarModal();
      this.actualizarUI();
    },

    vaciar: function() {
      if(confirm("¿Estás seguro de vaciar el carrito?")) {
        this.state.items = [];
        this.guardar();
        this.renderizarModal();
        this.actualizarUI();
      }
    },

    guardar: function() {
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(this.state.items));
    },

    calcularTotal: function() {
      return this.state.items.reduce((total, item) => total + (item.precio * item.cantidad), 0);
    },

    actualizarUI: function() {
      const badge = document.getElementById('cart-badge');
      const totalItems = this.state.items.reduce((acc, item) => acc + item.cantidad, 0);
      badge.textContent = totalItems;
      if (totalItems > 0) badge.classList.remove('d-none');
      else badge.classList.add('d-none');
    },

    renderizarModal: function() {
      const container = document.getElementById('carrito-items-container');
      const emptyMsg = document.getElementById('carrito-vacio-msg');
      const totalLabel = document.getElementById('carrito-total-label');

      container.innerHTML = '';

      if (this.state.items.length === 0) {
        emptyMsg.classList.remove('d-none');
        totalLabel.textContent = "0.00";
        return;
      }

      emptyMsg.classList.add('d-none');

      this.state.items.forEach(item => {
        const subtotal = item.precio * item.cantidad;
        const row = document.createElement('div');
        row.className = 'd-flex align-items-center justify-content-between border-bottom border-secondary py-3 animate-fade-in';
        row.innerHTML = `
          <div class="d-flex align-items-center">
            <div class="bg-secondary rounded d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; overflow:hidden;">
               <img src="${item.imagen}" class="w-100 h-100 object-fit-cover" onerror="this.src='https://via.placeholder.com/50'">
            </div>
            <div class="ms-3">
              <h6 class="mb-0 text-white fw-bold">${item.nombre}</h6>
              <small class="text-warning">$${item.precio.toFixed(2)} x ${item.cantidad}</small>
            </div>
          </div>
          <div class="text-end">
            <span class="d-block fw-bold mb-1">$${subtotal.toFixed(2)}</span>
            <button class="btn btn-sm btn-outline-danger border-0 p-1" onclick="carritoController.eliminar(${item.id})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        `;
        container.appendChild(row);
      });

      totalLabel.textContent = this.calcularTotal().toFixed(2);
    },

    // --- INTEGRACIÓN CON BACKEND (JAVA) ---
    procesarPago: async function() {
      if (this.state.items.length === 0) {
        alert("El carrito está vacío");
        return;
      }

      // 1. Obtener usuario de la sesión (si existe)
      const usuarioLogueado = JSON.parse(sessionStorage.getItem('usuarioLogueado'));
      const idUsuario = usuarioLogueado ? (usuarioLogueado.idUsuario || usuarioLogueado.id_usuario || 0) : 0;

      // 2. Crear DTO para Java
      const ordenCompra = {
        idUsuario: idUsuario,
        total: this.calcularTotal(),
        productos: this.state.items.map(item => ({
          id: item.id,
          nombre: item.nombre,
          precio: item.precio,
          cantidad: item.cantidad
        }))
      };

      // 3. UI Feedback
      const btnPagar = document.querySelector('#modalCarrito .btn-warning');
      const textoOriginal = btnPagar.innerHTML;
      btnPagar.disabled = true;
      btnPagar.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Procesando...';

      try {
        const response = await fetch(CONFIG.API_VENTAS, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(ordenCompra)
        });

        const data = await response.json();

        if (response.ok) {
          // ÉXITO
          this.state.items = [];
          this.guardar();
          this.actualizarUI();

          const modalEl = document.getElementById('modalCarrito');
          const modal = bootstrap.Modal.getInstance(modalEl);
          modal.hide();

          alert("✅ ¡Pedido confirmado! Tu factura ha sido generada en el sistema.");
        } else {
          alert("❌ Error: " + (data.mensaje || "El servidor rechazó la venta."));
        }

      } catch (error) {
        console.error(error);
        alert("❌ Error de conexión. Verifica que WildFly esté corriendo.");
      } finally {
        btnPagar.disabled = false;
        btnPagar.innerHTML = textoOriginal;
      }
    }
  };

  // --- CONTROLADOR DE VISTA (Catálogo) ---
  const catalogoView = {
    init: async function() {
      await this.fetchProductos();
      carritoController.actualizarUI();
    },

    fetchProductos: async function() {
      const container = document.getElementById('catalogo-container');
      try {
        const response = await fetch(CONFIG.API_PRODUCTOS);

        if (response.ok) {
          inventarioGlobal = await response.json();
          this.render(inventarioGlobal);
        } else {
          container.innerHTML = '<div class="col-12 text-center text-danger mt-5"><h3>Error cargando productos</h3></div>';
        }
      } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="col-12 text-center text-white-50 mt-5"><h3>Servidor desconectado</h3></div>';
      }
    },

    render: function(lista) {
      const container = document.getElementById('catalogo-container');
      container.innerHTML = '';

      if (!lista || lista.length === 0) {
        container.innerHTML = '<div class="col-12 text-center text-white-50">No hay productos en stock.</div>';
        return;
      }

      lista.forEach(item => {
        // Normalización de IDs
        const id = item.idProducto || item.id;
        const imageUrl = `${CONFIG.API_PRODUCTOS}/${id}/imagen`;

        let accionesHtml = '';
        let badgeHtml = '';

        if (item.tipo === 'venta') {
          badgeHtml = `<span class="badge bg-warning text-dark mb-2">Tienda</span>`;
          accionesHtml = `
            <div class="d-flex justify-content-between align-items-end mt-3">
              <span class="fs-4 fw-bold text-warning">$${item.precio.toFixed(2)}</span>
              <button class="btn btn-warning fw-bold text-dark rounded-pill px-3" onclick="carritoController.agregar(${id})">
                <i class="bi bi-cart-plus me-1"></i> Agregar
              </button>
            </div>
          `;
        } else {
          badgeHtml = `<span class="badge border border-light text-light mb-2">Uso Interno</span>`;
          accionesHtml = `
             <div class="mt-3 pt-2 border-top border-secondary text-white-50 small">
               <i class="bi bi-info-circle me-1"></i> Solo disponible en gimnasio
             </div>
          `;
        }

        const card = `
          <div class="col-md-4 col-sm-6 animate-fade-in">
            <div class="product-card">
              <img src="${imageUrl}" class="card-img-top" alt="${item.nombre}"
                   onerror="this.src='https://via.placeholder.com/400x300?text=Sin+Imagen'">
              <div class="card-body">
                ${badgeHtml}
                <h5 class="card-title text-white">${item.nombre}</h5>
                <p class="card-text text-white-50 small flex-grow-1">${item.descripcion}</p>
                ${accionesHtml}
              </div>
            </div>
          </div>
        `;
        container.innerHTML += card;
      });
    }
  };

  function filtrarProductos(categoria) {
    document.querySelectorAll('.nav-link').forEach(t => t.classList.remove('active'));

    const tabId = categoria === 'todos' ? 'pills-todos-tab' :
      categoria === 'venta' ? 'pills-venta-tab' : 'pills-uso-tab';

    document.getElementById(tabId)?.classList.add('active');

    if (categoria === 'todos') {
      catalogoView.render(inventarioGlobal);
    } else {
      catalogoView.render(inventarioGlobal.filter(i => i.tipo === categoria));
    }
  }

  // INICIO
  document.addEventListener('DOMContentLoaded', () => {
    catalogoView.init();
  });
</script>
</body>
</html>
